<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="cabecalho">
        <h3>Cadastre seu veículo para vender mais rápido</h3>
    </header>
    <div class="form-container">
        <div class="form-header">
            <p>Formulário</p>
        </div>

        <div class="form-body">
            <h1 class="titulo-form">Venda fácil seu carro</h1>
            <p>Descreva as características dos seu carro e marque os opcionais que ele possui</p>
            <form onsubmit="salvarCarros(event)">
                <div class="caixaInputs">
                    <label for="title">Título do Anúncio <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="title" id="title" class="block" placeholder="Um título para anunciar seu carro">
                </div>

                <div class="caixaInputs">
                    <label for="preco">Preço <span class="campo-obrigatorio">*</span></label>
                    <input type="number" name="preco" id="preco" class="block placeholder="Defina o preço">
                </div>

                <div class="caixaInputs">
                    <label for="descricao">Descrição <span class="campo-obrigatorio">*</span></label>
                    <textarea name="descricao" id="descricao" class="block placeholder="Faça a descrição de seu veículo"></textarea>
                </div>

                <div class="caixaInputs">
                    <label for="marca">Marca <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="marca" id="marca" class="block placeholder="Marca do veículo">
                </div>

                <div class="caixaInputs">
                    <label for="modelo">Modelo <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="modelo" id="modelo" class="block placeholder="Modelo do veículo">
                </div>

                <div class="caixaInputs">
                    <label for="kilometragem">Kilometragem <span class="campo-obrigatorio">*</span></label>
                    <input type="number" name="kilometragem" id="kilometragem" class="block placeholder="Kilometragem do veículo">
                </div>

                <div class="caixaInputs">
                    <label for="data-de-compra">Data de Compra <span class="campo-obrigatorio">*</span></label>
                    <input type="date" name="data-de-compra" id="data-de-compra" class="block">
                </div>

                <div class="caixaInputs">
                    <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                    <input type="radio" name="marcha" id="manual">
                    <label for="manual">Manual</label>
                    <input type="radio" name="marcha" id="auto">
                    <label for="auto">Automático</label>
                </div>

                <div class="caixaOpcional">
                    <p>Opcionais</p>
                    <ul class="listaOpcionais">
                        <li>
                            <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                            <label for="airbag">Airbag</label>
                        </li>
                        <li>
                             <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                            <label for="alarme">Alarme</label>
                        </li>
                        <li> <input type="checkbox" name="opcional[]" id="ac" value="ac">
                            <label for="ac">Ar Condicionado</label></li>
                        <li>
                             <input type="checkbox" name="opcional[]" id="camera-re" value="camera-re">
                            <label for="camera-re">Câmera de Ré</label>
                        </li>
                    </ul>
                </div>

                <div class="caixaOpcional">
                    <ul class="listaOpcionais">
                        <li>
                            <input type="checkbox" name="opcional[]" id="asssitente-pista" value="asssitente-pista">
                            <label for="asssitente-pista">Assistente de Pista</label>
                        </li>
                        <li>
                             <input type="checkbox" name="opcional[]" id="partida-sem-chave" value="partida-sem-chave">
                            <label for="partida-sem-chave">Partida sem Chave</label>
                        </li>
                        <li> <input type="checkbox" name="opcional[]" id="smartphone" value="smartphone">
                            <label for="smartphone">Integração com Celular</label></li>
                        <li>
                             <input type="checkbox" name="opcional[]" id="banco-couro" value="banco-couro">
                            <label for="banco-couro">Banco de Couro</label>
                        </li>
                    </ul>
                </div>
                <div class="caixaInputs">
                    <p>Fotos do carro <span class="campo-obrigatorio">*</span></p>
                    <input type="file" name="imagem" id="imagem" multiple accept="image/png, image/jpg">
                </div>
                <input type="submit" value="Enviar">
            </form>
            <hr>
            <h2>Carros Cadastrados</h2>
            <div></div>
        </div>
    </div>
    <script src="script/script.js"></script>
</body>
</html>
