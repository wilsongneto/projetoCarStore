<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Store</title>
</head>
<body>
    <header>
        <h3>Cadastre seu veículo para vender mais rápido</h3>
    </header>
    <div>
        <div>
            <p>Formulário</p>
        </div>

        <div>
            <h1>Venda fácil seu carro</h1>
            <p>Descreva as características dos seu carro e marque os opcionais que ele possui</p>
            <form>
                <div>
                    <label for="title">Título do Anúncio <span>*</span></label>
                    <input type="text" name="title" id="title" placeholder="Um título para anunciar seu carro">
                </div>

                <div>
                    <label for="preco">Preço <span>*</span></label>
                    <input type="number" name="preco" id="preco" placeholder="Defina o preço">
                </div>

                <div>
                    <label for="descricao">Descrição <span>*</span></label>
                    <textarea name="descricao" id="descricao" placeholder="Faça a descrição de seu veículo"></textarea>
                </div>

                <div>
                    <label for="marca">Marca <span>*</span></label>
                    <input type="text" name="marca" id="marca" placeholder="Marca do veículo">
                </div>

                <div>
                    <label for="modelo">Modelo <span>*</span></label>
                    <input type="text" name="modelo" id="modelo" placeholder="Modelo do veículo">
                </div>

                <div>
                    <label for="kilometragem">Kilometragem <span>*</span></label>
                    <input type="number" name="kilometragem" id="kilometragem" placeholder="Kilometragem do veículo">
                </div>

                <div>
                    <label for="data-de-compra">Data de Compra <span>*</span></label>
                    <input type="date" name="data-de-compra" id="data-de-compra">
                </div>

                <div>
                    <p>Tipo de Câmbio: <span>*</span></p>
                    <input type="radio" name="marcha" id="manual">
                    <label for="manual">Manual</label>
                    <input type="radio" name="marcha" id="auto">
                    <label for="auto">Automático</label>
                </div>

                <div>
                    <p>Opcionais</p>
                    <ul>
                        <li>
                            <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                            <label for="airbag">Airbag</label>
                        </li>
                        <li>
                             <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                            <label for="alarme">Alarme</label>
                        </li>
                        <li> <input type="checkbox" name="opcional[]" id="ac" value="ac">
                            <label for="ac">Ar Condicionado</label></li>
                        <li>
                             <input type="checkbox" name="opcional[]" id="camera-re" value="camera-re">
                            <label for="camera-re">Câmera de Ré</label>
                        </li>
                    </ul>
                </div>

                <div>
                    <ul>
                        <li>
                            <input type="checkbox" name="opcional[]" id="asssitente-pista" value="asssitente-pista">
                            <label for="asssitente-pista">Assistente de Pista</label>
                        </li>
                        <li>
                             <input type="checkbox" name="opcional[]" id="partida-sem-chave" value="partida-sem-chave">
                            <label for="partida-sem-chave">Partida sem Chave</label>
                        </li>
                        <li> <input type="checkbox" name="opcional[]" id="smartphone" value="smartphone">
                            <label for="smartphone">Integração com Celular</label></li>
                        <li>
                             <input type="checkbox" name="opcional[]" id="banco-couro" value="banco-couro">
                            <label for="banco-couro">Banco de Couro</label>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
